// ─── Shared Wireframe Primitives ────────────────────────────────────────────

const WF = {
  // Colors
  bg: '#faf9f7',
  bg2: '#f0ede8',
  line: '#444',
  lineFaint: '#bbb',
  lineAccent: '#2563eb',
  fill: '#e8e4de',
  fillBlue: '#dbeafe',
  fillGreen: '#d1fae5',
  fillRed: '#fee2e2',
  fillYellow: '#fef9c3',
  fillPurple: '#ede9fe',
  text: '#222',
  textFaint: '#888',
  cloud: '#2563eb',
  local: '#dc2626',
};

const S = {
  font: "'Caveat', cursive",
  get: (sz) => ({ fontFamily: "'Caveat', cursive", fontSize: sz, color: WF.text }),
};

// Hatched SVG fill for chart placeholders
function Hatch({ w, h, color = '#bbb', gap = 8, angle = 45, bg = 'transparent', style = {} }) {
  const id = `h${Math.random().toString(36).slice(2,7)}`;
  return (
    <svg width={w} height={h} style={{ display:'block', ...style }}>
      <defs>
        <pattern id={id} width={gap} height={gap} patternUnits="userSpaceOnUse" patternTransform={`rotate(${angle})`}>
          <line x1="0" y1="0" x2="0" y2={gap} stroke={color} strokeWidth="1.2"/>
        </pattern>
      </defs>
      <rect width={w} height={h} fill={bg}/>
      <rect width={w} height={h} fill={`url(#${id})`} opacity="0.6"/>
    </svg>
  );
}

// Box with rough sketchy border
function Box({ x, y, w, h, fill = WF.fill, stroke = WF.line, strokeW = 1.5, r = 2, children, label, labelPos = 'tl', annotation, style = {} }) {
  return (
    <div style={{ position:'absolute', left:x, top:y, width:w, height:h,
      background: fill, border: `${strokeW}px solid ${stroke}`, borderRadius: r,
      overflow:'hidden', ...style }}>
      {children}
      {label && (
        <div style={{ position:'absolute',
          top: labelPos.includes('b') ? 'auto' : 4,
          bottom: labelPos.includes('b') ? 4 : 'auto',
          left: labelPos.includes('r') ? 'auto' : 6,
          right: labelPos.includes('r') ? 6 : 'auto',
          fontFamily: WF.font, fontSize: 11, color: WF.textFaint, pointerEvents:'none',
          background: fill, padding:'0 2px', lineHeight:1 }}>
          {label}
        </div>
      )}
      {annotation && (
        <div style={{ position:'absolute', bottom:3, right:5,
          fontFamily: WF.font, fontSize: 10, color: WF.lineAccent, fontStyle:'italic' }}>
          ← {annotation}
        </div>
      )}
    </div>
  );
}

// Text label shorthand
function T({ x, y, size = 13, color = WF.text, weight = 400, children, italic = false, align = 'left', maxW }) {
  return (
    <div style={{ position:'absolute', left:x, top:y, fontFamily: WF.font, fontSize: size,
      color, fontWeight: weight, fontStyle: italic ? 'italic' : 'normal',
      textAlign: align, whiteSpace: maxW ? 'normal' : 'nowrap', maxWidth: maxW, lineHeight: 1.2 }}>
      {children}
    </div>
  );
}

// Privacy badge
function PrivacyBadge({ x, y, type = 'cloud' }) {
  const isCloud = type === 'cloud';
  return (
    <div style={{ position:'absolute', left:x, top:y, display:'flex', alignItems:'center', gap:3,
      background: isCloud ? '#dbeafe' : '#fee2e2',
      border: `1px solid ${isCloud ? '#93c5fd' : '#fca5a5'}`,
      borderRadius: 3, padding:'1px 5px', fontSize:10, fontFamily: WF.font,
      color: isCloud ? '#1d4ed8' : '#dc2626', whiteSpace:'nowrap' }}>
      {isCloud ? '☁ cloud-safe' : '🔒 local-only'}
    </div>
  );
}

// Pill / chip
function Pill({ x, y, label, active = false, color = WF.lineAccent }) {
  return (
    <div style={{ position:'absolute', left:x, top:y, padding:'2px 8px',
      border: `1.5px solid ${active ? color : WF.lineFaint}`,
      borderRadius: 12, fontSize: 12, fontFamily: WF.font,
      background: active ? color : 'transparent',
      color: active ? '#fff' : WF.textFaint, whiteSpace:'nowrap' }}>
      {label}
    </div>
  );
}

// Arrow annotation
function Arrow({ x1, y1, x2, y2, label, color = WF.lineAccent }) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx+dy*dy);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  return (
    <>
      <div style={{ position:'absolute', left:x1, top:y1, width:len, height:0,
        borderTop: `1.5px dashed ${color}`, transform:`rotate(${angle}deg)`, transformOrigin:'0 0', zIndex:20 }}/>
      {label && <div style={{ position:'absolute', left:(x1+x2)/2-20, top:(y1+y2)/2-14,
        fontSize:10, fontFamily: WF.font, color, zIndex:21, background: WF.bg, padding:'0 2px',
        whiteSpace:'nowrap' }}>{label}</div>}
    </>
  );
}

// Divider line
function Line({ x, y, w, h = 0, stroke = WF.lineFaint }) {
  return <div style={{ position:'absolute', left:x, top:y, width:w, height:Math.max(h,1),
    background: stroke }} />;
}

// KPI card
function KPICard({ x, y, w, h, title, value, sub, privacy, accentColor }) {
  return (
    <Box x={x} y={y} w={w} h={h} fill={WF.bg} stroke={WF.line} strokeW={1.5}>
      <T x={8} y={6} size={11} color={WF.textFaint}>{title}</T>
      <T x={8} y={22} size={h > 60 ? 22 : 18} weight={700} color={accentColor || WF.text}>{value}</T>
      {sub && <T x={8} y={h-18} size={11} color={WF.textFaint} italic>{sub}</T>}
      {privacy && <PrivacyBadge x={w-82} y={4} type={privacy}/>}
    </Box>
  );
}

        </div>

        <div style={{ background:'#181818', border:'1px solid #333', borderRadius:2, padding:'12px 16px', flex:1 }}>

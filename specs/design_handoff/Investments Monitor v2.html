<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Investments Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; height: 100%; }
  body { background: #0f0f0f; color: #f0f0f0; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #161616; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }
  input[type=range] { cursor: pointer; }
  input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
  a { text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Data + utilities -->
<script type="text/babel" src="im-data.jsx"></script>
<!-- Design system primitives -->
<script type="text/babel" src="im-ui.jsx"></script>
<!-- Screens -->
<script type="text/babel" src="im-cockpit.jsx"></script>
<script type="text/babel" src="im-holdings.jsx"></script>
<script type="text/babel" src="im-leverage.jsx"></script>
<script type="text/babel" src="im-watchlist.jsx"></script>
<script type="text/babel" src="im-login.jsx"></script>
<script type="text/babel" src="im-settings.jsx"></script>

<!-- Net Worth (inline, simple) -->
<script type="text/babel">
function NetWorthScreen({ publicView }) {
  const [propVal,   setPropVal]   = React.useState(MOCK.property.value);
  const [mortgageV, setMortgage]  = React.useState(MOCK.property.mortgageBalance);

  const portTotal   = portfolioTotal(MOCK.holdings);
  const totalAssets = portTotal + propVal + MOCK.cash;
  const totalLiab   = mortgageV + MOCK.heloc.drawn + MOCK.margin.balance;
  const netWorth    = totalAssets - totalLiab;
  const dte         = totalLiab / (totalAssets - totalLiab);
  const ltv         = mortgageV / propVal * 100;

  function ratioColor(r) { return r < 0.5 ? DS.green : r < 1.0 ? DS.amber : DS.red; }

  return (
    <div style={{ padding:'20px', display:'grid', gridTemplateColumns:'360px 1fr', gap:12 }}>

      {/* KPI strip */}
      <div style={{ gridColumn:'1/-1', display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:10 }}>
        <KPICard label="Net Worth" privacy="local"
          value={publicView ? '—' : fmtCAD(netWorth)}
          sub="Assets − liabilities" accent={DS.blue} blurred={publicView}/>
        <KPICard label="Total assets" privacy="local"
          value={publicView ? '—' : fmtCAD(totalAssets)}
          sub="Portfolio + property + cash" blurred={publicView}/>
        <KPICard label="Total liabilities" privacy="local"
          value={publicView ? '—' : fmtCAD(totalLiab)}
          sub="Mortgage + HELOC + margin"
          valueColor={publicView ? DS.textFaint : DS.red} blurred={publicView}/>
        <KPICard label="Debt-to-equity" privacy="cloud"
          value={`${dte.toFixed(2)}×`}
          sub="Liabilities ÷ equity"
          accent={ratioColor(dte)}/>
        <KPICard label="Mortgage LTV" privacy="local"
          value={`${ltv.toFixed(1)}%`}
          sub="Balance ÷ property value"
          accent={ltv > 80 ? DS.red : ltv > 65 ? DS.amber : undefined}
          blurred={publicView}/>
      </div>

      {/* Left: ledger */}
      <Panel>
        <SectionHead>Asset / Liability ledger</SectionHead>
        <div style={{ padding:'0 14px' }}>

          {/* ASSETS */}
          <div style={{ padding:'8px 0 4px', fontFamily:DS.fontSans, fontSize:10,
            color:DS.green, letterSpacing:1, borderBottom:`1px solid ${DS.border}` }}>ASSETS</div>

          {[
            { label:'Portfolio (auto)', val:portTotal, sub:'RRSP+TFSA+Unreg+Crypto', privacy:'local', editable:false },
            { label:'Cash / HISA',      val:MOCK.cash, sub:'manual',                 privacy:'local', editable:true  },
          ].map(({ label, val, sub, privacy, editable }) => (
            <div key={label} style={{ display:'flex', justifyContent:'space-between',
              alignItems:'center', padding:'9px 0', borderBottom:`1px solid ${DS.border}` }}>
              <div>
                <div style={{ fontFamily:DS.fontSans, fontSize:12, color:DS.text }}>
                  {label}{editable && <span style={{ marginLeft:5, fontSize:10, color:DS.textFaint }}>✎</span>}
                </div>
                <div style={{ fontFamily:DS.fontSans, fontSize:10, color:DS.textFaint }}>{sub}</div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontFamily:DS.fontMono, fontSize:13,
                  color:publicView ? DS.textFaint : DS.text,
                  filter:publicView ? 'blur(4px)' : 'none' }}>
                  {fmtCAD(val)}</span>
                <PrivBadge type={privacy}/>
              </div>
            </div>
          ))}

          {/* Property — slider */}
          <div style={{ padding:'10px 0', borderBottom:`1px solid ${DS.border}` }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
              <div>
                <div style={{ fontFamily:DS.fontSans, fontSize:12, color:DS.text }}>
                  Primary residence ✎
                  <span style={{ marginLeft:6, fontSize:10, color:DS.textFaint }}>manual estimate</span>
                </div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontFamily:DS.fontMono, fontSize:13, color: publicView ? DS.textFaint : DS.green,
                  filter: publicView ? 'blur(4px)' : 'none' }}>
                  {fmtCAD(propVal)}</span>
                <PrivBadge type="local"/>
              </div>
            </div>
            <input type="range" min={300000} max={2000000} step={5000}
              value={propVal} onChange={e => setPropVal(+e.target.value)}
              style={{ width:'100%', accentColor:DS.green }}/>
            <div style={{ display:'flex', justifyContent:'space-between',
              fontFamily:DS.fontMono, fontSize:9, color:DS.textFaint, marginTop:2 }}>
              <span>$300k</span><span>$2M</span>
            </div>
          </div>

          {/* Assets total */}
          <div style={{ display:'flex', justifyContent:'space-between', padding:'8px 0',
            borderBottom:`1px solid ${DS.borderMid}`, fontFamily:DS.fontMono,
            fontSize:13, fontWeight:700, color:DS.green }}>
            <span style={{ fontFamily:DS.fontSans, fontSize:13, fontWeight:600 }}>Total assets</span>
            <span style={{ filter:publicView?'blur(4px)':'none' }}>{fmtCAD(totalAssets)}</span>
          </div>

          {/* LIABILITIES */}
          <div style={{ padding:'8px 0 4px', fontFamily:DS.fontSans, fontSize:10,
            color:DS.red, letterSpacing:1, borderBottom:`1px solid ${DS.border}` }}>LIABILITIES</div>

          {/* Mortgage slider */}
          <div style={{ padding:'10px 0', borderBottom:`1px solid ${DS.border}` }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
              <div>
                <div style={{ fontFamily:DS.fontSans, fontSize:12, color:DS.text }}>
                  Mortgage balance ✎
                  <span style={{ marginLeft:6, fontSize:10, color:DS.textFaint }}>manual</span>
                </div>
                <div style={{ fontFamily:DS.fontSans, fontSize:10, color:DS.textFaint }}>
                  {MOCK.property.rate}% fixed · renews {MOCK.property.renewalDate}
                </div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontFamily:DS.fontMono, fontSize:13, color:publicView?DS.textFaint:DS.red,
                  filter:publicView?'blur(4px)':'none' }}>({fmtCAD(mortgageV)})</span>
                <PrivBadge type="local"/>
              </div>
            </div>
            <input type="range" min={0} max={1000000} step={1000}
              value={mortgageV} onChange={e => setMortgage(+e.target.value)}
              style={{ width:'100%', accentColor:DS.red }}/>
          </div>

          {[
            { label:'HELOC (auto)',  val:MOCK.heloc.drawn,     sub:'from Leverage screen',  privacy:'cloud' },
            { label:'Margin (auto)', val:MOCK.margin.balance,  sub:'Questrade unregistered', privacy:'cloud' },
          ].map(({ label, val, sub, privacy }) => (
            <div key={label} style={{ display:'flex', justifyContent:'space-between',
              alignItems:'center', padding:'9px 0', borderBottom:`1px solid ${DS.border}` }}>
              <div>
                <div style={{ fontFamily:DS.fontSans, fontSize:12, color:DS.text }}>{label}</div>
                <div style={{ fontFamily:DS.fontSans, fontSize:10, color:DS.textFaint }}>{sub}</div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontFamily:DS.fontMono, fontSize:13, color:DS.red }}>
                  ({fmtCAD(val)})</span>
                <PrivBadge type={privacy}/>
              </div>
            </div>
          ))}

          {/* Liabilities total */}
          <div style={{ display:'flex', justifyContent:'space-between', padding:'8px 0',
            borderBottom:`1px solid ${DS.borderMid}`, fontFamily:DS.fontMono,
            fontSize:13, fontWeight:700, color:DS.red }}>
            <span style={{ fontFamily:DS.fontSans, fontSize:13, fontWeight:600 }}>Total liabilities</span>
            <span style={{ filter:publicView?'blur(4px)':'none' }}>({fmtCAD(totalLiab)})</span>
          </div>

          {/* Net worth */}
          <div style={{ display:'flex', justifyContent:'space-between', padding:'12px 0',
            fontFamily:DS.fontMono, fontSize:16, fontWeight:700, color:DS.blue }}>
            <span style={{ fontFamily:DS.fontSans, fontSize:14, fontWeight:700 }}>Net worth</span>
            <span style={{ filter:publicView?'blur(5px)':'none' }}>{fmtCAD(netWorth)}</span>
          </div>
        </div>
      </Panel>

      {/* Right: visualization */}
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>

        {/* Asset vs Liability bar */}
        <Panel>
          <SectionHead right={<PrivBadge type="cloud"/>}>Asset / Liability breakdown</SectionHead>
          <div style={{ padding:'14px 16px' }}>
            {[
              { label:'Assets', items:[
                { l:'Portfolio', v:portTotal, c:'#3b82f6' },
                { l:'Property',  v:propVal,   c:'#22c55e' },
                { l:'Cash',      v:MOCK.cash, c:'#a78bfa' },
              ]},
              { label:'Liabilities', items:[
                { l:'Mortgage', v:mortgageV,          c:'#ef4444' },
                { l:'HELOC',    v:MOCK.heloc.drawn,   c:'#f97316' },
                { l:'Margin',   v:MOCK.margin.balance,c:'#f59e0b' },
              ]},
            ].map(({ label, items }) => {
              const total = items.reduce((s,i)=>s+i.v, 0);
              return (
                <div key={label} style={{ marginBottom:16 }}>
                  <div style={{ fontFamily:DS.fontSans, fontSize:11, color:DS.textSub,
                    marginBottom:5 }}>{label} — {fmtCAD(total)}</div>
                  <div style={{ height:20, display:'flex', borderRadius:3,
                    overflow:'hidden', gap:1, marginBottom:5 }}>
                    {items.map(it => (
                      <div key={it.l} title={`${it.l}: ${fmtCAD(it.v)}`}
                        style={{ flex:it.v, background:it.c, opacity:0.7 }}/>
                    ))}
                  </div>
                  <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>
                    {items.map(it => (
                      <span key={it.l} style={{ fontFamily:DS.fontSans, fontSize:10,
                        color:DS.textFaint, display:'flex', alignItems:'center', gap:4 }}>
                        <span style={{ width:7, height:7, background:it.c,
                          borderRadius:1, display:'inline-block', opacity:0.8 }}/>
                        {it.l} {(it.v/total*100).toFixed(0)}%
                      </span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </Panel>

        {/* Mortgage detail */}
        <Panel>
          <SectionHead right={<PrivBadge type="local"/>}>Mortgage & property</SectionHead>
          <div style={{ padding:'12px 16px' }}>
            {[
              ['Property value (est.)', fmtCAD(propVal),               DS.text],
              ['Mortgage balance',      fmtCAD(mortgageV),             DS.red],
              ['Home equity',           fmtCAD(propVal - mortgageV),   DS.green],
              ['LTV ratio',             `${ltv.toFixed(1)}%`,          ltv > 80 ? DS.red : ltv > 65 ? DS.amber : DS.green],
              ['Rate',                  `${MOCK.property.rate}% fixed`,DS.textSub],
              ['Renewal',               MOCK.property.renewalDate,     DS.textSub],
            ].map(([lbl, val, col]) => (
              <div key={lbl} style={{ display:'flex', justifyContent:'space-between',
                padding:'6px 0', borderBottom:`1px solid ${DS.border}` }}>
                <span style={{ fontFamily:DS.fontSans, fontSize:12, color:DS.textSub }}>{lbl}</span>
                <span style={{ fontFamily:DS.fontMono, fontSize:12, color:col,
                  fontWeight:600, filter:publicView?'blur(4px)':'none' }}>{val}</span>
              </div>
            ))}
            <div style={{ marginTop:10, fontFamily:DS.fontSans, fontSize:10,
              color:DS.textFaint, fontStyle:'italic' }}>
              ✎ All property fields are manual entry — no valuation API in v1
            </div>
          </div>
        </Panel>
      </div>
    </div>
  );
}
Object.assign(window, { NetWorthScreen });
</script>

<!-- ── App shell ──────────────────────────────────────────────────────────── -->
<script type="text/babel">
const SESSION_DURATION_S = 600; // 10 min
const WARN_BEFORE_S      = 60;

function App() {
  const [loggedIn,    setLoggedIn]    = React.useState(false);
  const [screen,      setScreen]      = React.useState(() =>
    localStorage.getItem('im_screen') || 'cockpit');
  const [scope,       setScope]       = React.useState('all');
  const [publicView,  setPublicView]  = React.useState(false);

  // Session timer
  const [sessionLeft,  setSessionLeft]  = React.useState(null);
  const [bannerDismissed, setBannerDismissed] = React.useState(false);
  const timerRef = React.useRef(null);

  function resetSession() {
    clearInterval(timerRef.current);
    let t = SESSION_DURATION_S;
    setSessionLeft(null);
    setBannerDismissed(false);
    timerRef.current = setInterval(() => {
      t -= 1;
      if (t <= WARN_BEFORE_S) setSessionLeft(t);
      if (t <= 0) {
        clearInterval(timerRef.current);
        setLoggedIn(false);
        setSessionLeft(null);
      }
    }, 1000);
  }

  React.useEffect(() => {
    if (loggedIn) resetSession();
    else { clearInterval(timerRef.current); setSessionLeft(null); }
    return () => clearInterval(timerRef.current);
  }, [loggedIn]);

  React.useEffect(() => {
    localStorage.setItem('im_screen', screen);
  }, [screen]);

  if (!loggedIn) {
    return <LoginScreen onLogin={() => { setLoggedIn(true); setScreen('cockpit'); }}/>;
  }

  const bannerShowing = sessionLeft !== null;
  const mainTop       = 44 + (bannerShowing ? 36 : 0);  // nav height + optional banner

  const hasScopeStrip = ['holdings','leverage'].includes(screen);
  const contentTop    = mainTop + (hasScopeStrip ? 34 : 0);

  return (
    <div style={{ background: DS.bg, minHeight:'100vh' }}>
      <TopNav
        screen={screen} setScreen={setScreen}
        publicView={publicView} setPublicView={setPublicView}/>

      <SessionBanner
        secondsLeft={bannerDismissed ? null : sessionLeft}
        onExtend={() => { resetSession(); }}
        onDismiss={() => setBannerDismissed(true)}/>

      {hasScopeStrip && (
        <div style={{ position:'fixed', top:mainTop, left:0, right:0, zIndex:90 }}>
          <ScopeStrip scope={scope} setScope={setScope}/>
        </div>
      )}

      <div style={{ paddingTop:contentTop }}>
        {screen === 'cockpit'   && <CockpitScreen  publicView={publicView} setScreen={setScreen}/>}
        {screen === 'holdings'  && <HoldingsScreen  scope={scope} publicView={publicView}/>}
        {screen === 'leverage'  && <LeverageScreen/>}
        {screen === 'networth'  && <NetWorthScreen   publicView={publicView}/>}
        {screen === 'watchlist' && <WatchlistScreen/>}
        {screen === 'settings'  && <SettingsScreen/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">

    <rect x="8" y="16" width="24" height="16" rx="2" fill="#1e1e1e"/>
    <text x="12" y="24" font-size="4" fill="#888" font-family="monospace">Net Worth</text>
    <text x="12" y="29" font-size="5" fill="#3b82f6" font-family="monospace" font-weight="bold">—</text>
    <rect x="36" y="16" width="24" height="16" rx="2" fill="#1e1e1e"/>
    <text x="40" y="24" font-size="4" fill="#888" font-family="monospace">Leverage</text>

</template>
</body>
</html>

name: Refresh Portfolio Summary

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for refresh (optional)"
        required: false
        default: "Manual refresh from cloud app"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -q --upgrade pip
          pip install -q -r requirements.txt

      - name: Fetch latest prices and generate summary
        run: python3 scripts/refresh.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify summary was generated
        run: |
          if [ -f public/summary.json ]; then
            echo "✓ Summary generated:"
            jq '.as_of' public/summary.json
          else
            echo "✗ Summary not found"
            exit 1
          fi

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/summary.json
          git commit -m "chore: auto-refresh summary.json via GitHub Actions" \
            --author="github-actions[bot] <github-actions[bot]@users.noreply.github.com>" \
            || echo "No changes to commit"
          git push origin main
